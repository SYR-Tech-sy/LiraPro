kind = "web"
previewPath = "/"
title = "LiraPro - Syrian Currency Exchange"
version = "1.0.0"
id = "artifacts/syr-syp"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19371

[services.development]
run = "pnpm --filter @workspace/syr-syp run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/syr-syp", "run", "build" ]
publicDir = "artifacts/syr-syp/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19371"
BASE_PATH = "/"
